<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="app.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Ice Burg</title>
</head>

<body>
    <form>
        <textarea name="input" id="myTextarea" placeholder="Paste your input here..."></textarea>
        <button type="submit" id="myButton" >Submit</button>
    </form>
</body>

<script type="module">

    // import google gen ai and create an instance
    import { GoogleGenAI } from "https://esm.sh";
    const ai = new GoogleGenAI({ apiKey: "YOUR_API_KEY" });


    const form = document.querySelector('form');

    form.addEventListener('submit', (event) => {
        event.preventDefault(); // Stop the page from reloading

        
        const formData = new FormData(form);
        const text = formData.get('input'); // Uses the 'name' attribute of your textarea

        console.log(text);
    });

    const interaction = await ai.interactions.create({
        model: "gemini-2.5-flash",
        input: "Explain how AI works in a few words",
    });

    console.log(interaction.output_text);


</script>

</html>
